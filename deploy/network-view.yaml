# unifi-vision — Home Assistant "Network" dashboard view
#
# Add this view under `views:` in the dashboard raw configuration editor, or
# copy the `cards:` block into a view created in the UI.
#
# Register the Lovelace resource first; see deploy/lovelace-resource.md.
# Replace the example entity IDs below with the entities created by MQTT
# discovery for your own switches.

title: Network
path: network
icon: mdi:lan
cards:
  - type: vertical-stack
    cards:
      - type: custom:unifi-switch-card
        entity: sensor.unifi_vision_core_switch
        title: Core Switch
      - type: custom:unifi-switch-card
        entity: sensor.unifi_vision_access_switch
        title: Access Switch
      - type: custom:unifi-switch-card
        entity: sensor.unifi_vision_home_gateway
        title: Home Gateway
