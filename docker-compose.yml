      - "127.0.0.1:8091:8091"
    networks:
      - n8n-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8091/health" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  skool-reply:
    build:
      context: ./commander/projects/skool-reply
    image: skool-reply:latest
    container_name: skool-reply
    restart: unless-stopped
    environment:
      SKOOL_API_URL: http://skool-api:8091
    ports:
      - "127.0.0.1:8092:8092"
    networks:
      - n8n-net
    depends_on:
      - skool-api
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8092/health')" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Live node-flow observer for Claude Code agent runs (hook events -> SSE -> browser).
  # Single worker (in-process SSE broker). Token-gated /ingest; reads are open behind the tunnel.
  # Tunnel route: flow.synai.ai -> agent-flow:8063
  agent-flow:
    build:
      context: ./commander/projects/agent-flow
      dockerfile: Dockerfile
    image: agent-flow:latest
    container_name: agent-flow
    restart: unless-stopped
    env_file:
      - ./commander/projects/agent-flow/.env
    ports:
      - "127.0.0.1:8063:8063"
    volumes:
      - /home/mello/agent-flow-data:/data
    networks:
      - n8n-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8063/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  mello-garden:
    build:
      context: ./mello-garden
      dockerfile: Dockerfile
    container_name: mello-garden
    restart: always
    ports:
      - "127.0.0.1:3010:3000"
    environment:
      DATABASE_URL: "postgresql://n8n:n8n@n8n-postgres:5432/mello_garden"
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      TZ: America/Chicago
      AUTH_PASSWORD: ${MELLO_GARDEN_PASSWORD}
      SESSION_SECRET: ${MELLO_GARDEN_SESSION_SECRET}
      GARDEN_INTERNAL_TOKEN: ${GARDEN_INTERNAL_TOKEN}
    volumes:
      - /data/mello-garden/images:/app/public/uploads
    networks:
      - n8n-net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  fb-monitor:
    build:
      context: ./commander/projects/fb-monitor
    image: fb-monitor:latest
    container_name: fb-monitor
    user: "1001:1001"
    restart: unless-stopped
    environment:
      TELEGRAM_FB_EXTRACTOR_TOKEN: ${TELEGRAM_FB_EXTRACTOR_TOKEN}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-1359185565}
      NOCODB_URL: http://nocodb:8080
      NOCODB_API_TOKEN: ${NOCODB_API}
      NOCODB_TABLE_ID: ${NOCODB_FB_PROFILES_TABLE_ID}
      NOCODB_INFLUENCER_BASE_ID: ${NOCODB_INFLUENCER_BASE_ID}
      TZ: America/Chicago
      HOME: /home/mello
      PYTHONPATH: /home/mello/commander/tools
      PYTHONUNBUFFERED: 1
    volumes:
      - /data/fb-monitor:/data/fb-monitor
      - /home/mello/facebook_cookies.txt:/home/mello/facebook_cookies.txt:ro
      - /home/mello/commander/tools:/home/mello/commander/tools:ro
    networks:
      - n8n-net

  garden-telegram:
    build:
      context: ./commander/projects/garden-telegram
    image: garden-telegram:latest
    container_name: garden-telegram
    user: "1001:1001"
    restart: unless-stopped
    depends_on:
      mello-garden:
        condition: service_healthy
    environment:
      TELEGRAM_GARDEN_TOKEN: ${TELEGRAM_GARDEN_TOKEN}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
      TELEGRAM_NOTIFICATION_CHAT_ID: ${TELEGRAM_DEFAULT_CHAT_ID:-}
      GARDEN_API_BASE: http://mello-garden:3000
      GARDEN_INTERNAL_TOKEN: ${GARDEN_INTERNAL_TOKEN}
      HOME_ASSISTANT_URL: http://192.168.2.120:8123
      HOME_ASSISTANT_TOKEN: ${HOME_ASSISTANT_TOKEN}
      TZ: America/Chicago
      HOME: /home/mello
      PATH: /home/mello/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PYTHONPATH: /home/mello/commander/tools
      PYTHONUNBUFFERED: 1
    volumes:
      - /home/mello/commander/tools:/home/mello/commander/tools:ro
      - /data/garden-telegram/state:/app/data
      - /home/mello/.local/bin:/home/mello/.local/bin:ro
      - /home/mello/.local/share/claude:/home/mello/.local/share/claude:ro
      - /home/mello/.claude.json:/home/mello/.claude.json:ro
      - /home/mello/.claude/.credentials.json:/home/mello/.claude/.credentials.json:ro
    networks:
      - n8n-net

  drinkwaretrove-gallery:
    build:
      context: ./commander/projects/drinkwaretrove-gallery
      dockerfile: Dockerfile
    image: drinkwaretrove-gallery:latest
    container_name: drinkwaretrove-gallery
    restart: unless-stopped
    environment:
      NOCODB_URL: http://nocodb:8080
      NOCODB_API_TOKEN: ${NOCODB_API}
      NODE_ENV: production
      PORT: "3004"
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:3004:3004"
    volumes:
      - /data/sites/drinkwaretrove:/data/sites/drinkwaretrove
      - /home/mello/ComfyUI/output:/home/mello/ComfyUI/output:ro
      - drinkwaretrove-cache:/app/.next/cache
    networks:
      - n8n-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3004/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mellobooks-api:
    build: ./mellobooks/api
    container_name: mellobooks-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3400:3400"
    environment:
      - DATABASE_URL=postgresql://n8n:n8n@postgres:5432/mellobooks
      - JWT_SECRET=${MB_JWT_SECRET}
      - CLAUDE_API_KEY=${ANTHROPIC_API_KEY}
      - PLAID_CLIENT_ID=${PLAID_CLIENT_ID}
      - PLAID_SECRET=${PLAID_SECRET}
      - PLAID_ENV=sandbox
      - UPLOAD_DIR=/data/uploads
      - AUTH_PASSWORD=${MB_AUTH_PASSWORD}
      - NODE_ENV=production
    volumes:
      - mellobooks-uploads:/data/uploads
    depends_on:
      - postgres
    networks:
      - n8n-net

  mellobooks-web:
    build: ./mellobooks/web
    container_name: mellobooks-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3401:3000"
    depends_on:
      - mellobooks-api
    networks:
      - n8n-net

  viqa:
    build: ./commander/projects/viqa
    container_name: viqa
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ '0' ]
              capabilities: [ gpu ]
    ports:
      - "192.168.3.60:3011:3011"
    environment:
      PYTHONUNBUFFERED: "1"
      OLLAMA_URL: "http://ollama:11434"
      VLM_MODEL: "gemma4:31b-it-q8_0"
      BLUR_THRESHOLD: "80.0"
      TRAINING_DIR: "/data/training/viqa"
      OPERATOR_REVIEW: "false"
    volumes:
      - /data/training/viqa:/data/training/viqa
      - /home/mello/mb_inspection/model_cache:/root/.cache
    networks:
      - n8n-net

  decay-viewer:
    build: ./commander/projects/decay_pipeline
    container_name: decay-viewer
    restart: unless-stopped
    ports:
      - "127.0.0.1:3012:3012"
    volumes:
      - /home/mello/commander/projects/decay_pipeline/output:/app/output:ro
    networks:
      - n8n-net

  ai-psychologist:
    build:
      context: ./commander/projects/ai-psychologist
      dockerfile: Dockerfile
    image: ai-psychologist:latest
    container_name: ai-psychologist
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: "postgresql://n8n:n8n@postgres:5432/ai_psychologist"
      COMFYUI_API_URL: http://comfyui:8188
      TTS_SERVICE_URL: http://tts-service:8096
      WHISPER_STT_URL: http://whisper-stt:8058/transcribe
      NODE_ENV: production
      PORT: "3021"
      HOSTNAME: 0.0.0.0
      TZ: America/Chicago
      AUTH_PASSWORD: ${AI_PSYCHOLOGIST_PASSWORD}
      SESSION_SECRET: ${AI_PSYCHOLOGIST_SESSION_SECRET}
      COMFYUI_INPUT_DIR: /comfyui-input
      COMFYUI_OUTPUT_DIR: /comfyui-output
      AUDIO_DIR: /data/sites/ai-psychologist/audio
      VIDEO_DIR: /data/sites/ai-psychologist/video
      VOICE_REF_PATH: /data/sites/ai-psychologist/voices/sofia.wav
      PORTRAIT_PATH: /app/assets/portraits/sofia.png
      TTS_VOICE_REF: /data/sites/ai-psychologist/voices/sofia.wav
    ports:
      - "127.0.0.1:3021:3021"
    volumes:
      - /data/sites/ai-psychologist:/data/sites/ai-psychologist
      - /data/ai-psychologist/portraits:/app/assets/portraits
      - /data/ai-psychologist/sounds:/app/assets/sounds
      - /home/mello/ComfyUI/input:/comfyui-input
      - /home/mello/ComfyUI/output:/comfyui-output:ro
      - /home/mello/comfyui-workflows/avatar:/app/assets/workflows:ro
      - /home/mello/.claude.json:/home/appuser/.claude.json:ro
      - /home/mello/.claude:/home/appuser/.claude:ro
    networks:
      - n8n-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3021/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  pipeline-telegram:
    build:
      context: ./commander/projects/pipeline-telegram
    image: pipeline-telegram:latest
    container_name: pipeline-telegram
    user: "1001:1001"
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      TELEGRAM_PIPELINE_TOKEN: ${TELEGRAM_PIPELINE_TOKEN}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
      HOME: /home/mello
      PYTHONPATH: /home/mello/commander/tools
      PYTHONUNBUFFERED: 1
      NOCODB_URL: http://nocodb:8080
      NOCODB_API: ${NOCODB_API:-}
      NOCODB_API_TOKEN: ${NOCODB_API:-}
      COMFYUI_URL: http://comfyui:8188
      EVERBEE_TOKEN: ${EVERBEE_TOKEN:-}
      MYDESIGNS_EMAIL: ${MYDESIGNS_EMAIL:-}
      MYDESIGNS_PASSWORD: ${MYDESIGNS_PASSWORD:-}
      TOPICS_TODAY_PATH: /home/mello/commander/projects/linkedin-gems/data/topics_today.json
    volumes:
      - /home/mello:/home/mello:rw
      - /data:/data
      - /home/mello/.claude/confirm:/home/mello/.claude/confirm:rw
    networks:
      - n8n-net

  # ==========================================================================
  # Social Posting Pipeline
  # ==========================================================================
  social-posting:
    build: ./commander/projects/social_posting
    image: social-posting:latest
    container_name: social-posting
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      HOME: /home/mello
      PYTHONPATH: /app:/app/tools
      PYTHONUNBUFFERED: "1"
      TZ: America/Chicago
      NOCODB_URL: http://nocodb:8080
      NOCODB_API: ${NOCODB_API:-}
      COMFYUI_URL: http://comfyui:8188
      TTS_URL: http://whisper-stt:8096
      TELEGRAM_PIPELINE_TOKEN: ${TELEGRAM_PIPELINE_TOKEN:-}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
      SOCIAL_POSTING_MEDIA_ROOT: /app/media
      SOCIAL_POSTING_PACKS_DIR: /app/packs
      SOCIAL_POSTING_CONFIRM_DIR: /home/mello/.claude/confirm
      SOCIAL_POSTING_APPROVAL_CHAT_ID: ${SOCIAL_POSTING_APPROVAL_CHAT_ID:-}
      LINKEDIN_COMMANDER_ACCESS_TOKEN: ${LINKEDIN_COMMANDER_ACCESS_TOKEN:-}
      LINKEDIN_COMMANDER_REFRESH_TOKEN: ${LINKEDIN_COMMANDER_REFRESH_TOKEN:-}
      LINKEDIN_COMMANDER_URN: ${LINKEDIN_COMMANDER_URN:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
      X_COMMANDER_ACCESS_TOKEN: ${X_COMMANDER_ACCESS_TOKEN:-}
      X_COMMANDER_ACCESS_TOKEN_SECRET: ${X_COMMANDER_ACCESS_TOKEN_SECRET:-}
      X_CLIENT_ID: ${X_CLIENT_ID:-}
      X_CLIENT_SECRET: ${X_CLIENT_SECRET:-}
      INSTAGRAM_COMMANDER_ACCESS_TOKEN: ${INSTAGRAM_COMMANDER_ACCESS_TOKEN:-}
      INSTAGRAM_COMMANDER_ACCOUNT_ID: ${INSTAGRAM_COMMANDER_ACCOUNT_ID:-}
      FACEBOOK_COMMANDER_PAGE_TOKEN: ${FACEBOOK_COMMANDER_PAGE_TOKEN:-}
      FACEBOOK_COMMANDER_PAGE_ID: ${FACEBOOK_COMMANDER_PAGE_ID:-}
    volumes:
      - ./commander/projects/social_posting:/app
      - ./commander/tools:/app/tools
      - /home/mello/.credentials:/home/mello/.credentials:rw
      - /home/mello/.claude/confirm:/home/mello/.claude/confirm:rw
      - /home/mello/.local/bin/claude:/usr/local/bin/claude:ro
      - /home/mello/.claude.json:/home/mello/.claude.json:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    networks:
      - n8n-net
    depends_on:
      - nocodb
      - comfyui

  # ==========================================================================
  # LinkedIn Gem Pipeline
  # Watches tracked LinkedIn profiles for high-velocity "gem" posts, drafts
  # 3 Roberto-voice reactions, routes to Telegram for 5-button approval,
  # publishes the chosen draft. Text-only, no GPU.
  # ==========================================================================
  linkedin-gems:
    build: ./commander/projects/linkedin-gems
    image: linkedin-gems:latest
    container_name: linkedin-gems
    user: "1001:1001"
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      HOME: /home/mello
      PYTHONPATH: /app:/app/tools
      PYTHONUNBUFFERED: "1"
      TZ: America/Chicago
      NOCODB_URL: http://nocodb:8080
      NOCODB_API: ${NOCODB_API:-}
      APIFY_API_TOKEN: ${APIFY_API_TOKEN:-}
      APIFY_LINKEDIN_POSTS_ACTOR: ${APIFY_LINKEDIN_POSTS_ACTOR:-harvestapi/linkedin-profile-posts}
      TELEGRAM_PIPELINE_TOKEN: ${TELEGRAM_PIPELINE_TOKEN:-}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
      LINKEDIN_GEMS_APPROVAL_CHAT_ID: ${LINKEDIN_GEMS_APPROVAL_CHAT_ID:-${TELEGRAM_ALLOWED_USERS:-}}
      LINKEDIN_GEMS_SCRAPE_INTERVAL_MIN: ${LINKEDIN_GEMS_SCRAPE_INTERVAL_MIN:-75}
      LINKEDIN_GEMS_THRESHOLD_MULT: ${LINKEDIN_GEMS_THRESHOLD_MULT:-3.0}
      LINKEDIN_GEMS_MIN_HOURS: ${LINKEDIN_GEMS_MIN_HOURS:-2.0}
      LINKEDIN_GEMS_MAX_TARGETS: ${LINKEDIN_GEMS_MAX_TARGETS:-10}
      LINKEDIN_GEMS_APPROVAL_TIMEOUT_H: ${LINKEDIN_GEMS_APPROVAL_TIMEOUT_H:-24}
      LINKEDIN_GEMS_CLAUDE_MODEL: ${LINKEDIN_GEMS_CLAUDE_MODEL:-opus}
      LINKEDIN_COMMANDER_ACCESS_TOKEN: ${LINKEDIN_COMMANDER_ACCESS_TOKEN:-}
      LINKEDIN_COMMANDER_REFRESH_TOKEN: ${LINKEDIN_COMMANDER_REFRESH_TOKEN:-}
      LINKEDIN_COMMANDER_URN: ${LINKEDIN_COMMANDER_URN:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
    volumes:
      - ./commander/projects/linkedin-gems:/app
      - ./commander/tools:/app/tools
      - /home/mello/.credentials:/home/mello/.credentials:rw
      - /home/mello/.claude/confirm:/home/mello/.claude/confirm:rw
      - /home/mello/.local/bin/claude:/usr/local/bin/claude:ro
      - /home/mello/.claude.json:/home/mello/.claude.json:ro
      - /home/mello/.claude:/home/mello/.claude:ro
      - /home/mello/.claude/projects/-home-mello/memory:/app/memory:ro
      - ./commander/projects/linkedin-gems/data:/app/data
    networks:
      - n8n-net
    depends_on:
      - nocodb
      - pipeline-telegram

  media-server:
    image: nginx:alpine
    container_name: media-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8056:80"
    volumes:
      - ./commander/projects/social_posting/media:/usr/share/nginx/html:ro
    networks:
      - n8n-net
    # Tunnel route: media.synai.ai -> media-server:80 (port 8056 on host)
    # 4-hour media cleanup: cron on host removes files older than 4h
    # UUID-in-path provides obscurity (accepted risk per Roberto's sign-off)

  alm-quotes:
    image: nginx:alpine
    container_name: alm-quotes
    restart: unless-stopped
    ports:
      - "127.0.0.1:8210:80"
    volumes:
      - ./commander/projects/alm-quotes:/usr/share/nginx/html:ro
    networks:
      - n8n-net
    # Tunnel route: alm-quotes.synai.ai -> alm-quotes:80 (port 8210 on host)
    # Static quote-builder for Automation Lab Materials (Omar/Kamel Itani)

  # ==========================================================================
  # Matomo Analytics
  # ==========================================================================
  matomo-db:
    image: mariadb:11
    container_name: matomo-db
    restart: always
    environment:
      MARIADB_DATABASE: matomo
      MARIADB_USER: matomo
      MARIADB_PASSWORD: ${MATOMO_DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MATOMO_DB_ROOT_PASSWORD}
    volumes:
      - matomo_db_data:/var/lib/mysql
    networks:
      - n8n-net

  matomo:
    image: matomo:5-apache
    container_name: matomo
    restart: always
    depends_on:
      - matomo-db
    environment:
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_TABLES_PREFIX: matomo_
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DB_PASSWORD}
      MATOMO_DATABASE_DBNAME: matomo
      PHP_MEMORY_LIMIT: 512M
    ports:
      - "127.0.0.1:8100:80"
    volumes:
      - matomo_data:/var/www/html
    networks:
      - n8n-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  safeplate:
    build:
      context: ./commander/projects/safeplate
      dockerfile: Dockerfile
    container_name: safeplate
    restart: unless-stopped
    ports:
      - "127.0.0.1:3030:3000"
    environment:
      DATABASE_URL: "postgresql://n8n:n8n@postgres:5432/safeplate"
      NODE_ENV: production
      SESSION_SECRET: "${SAFEPLATE_SESSION_SECRET}"
      TZ: America/Chicago
    networks:
      - n8n-net
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  obsidian:
    image: lscr.io/linuxserver/obsidian:latest
    container_name: obsidian
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      PUID: "1001"
      PGID: "1001"
      TZ: America/Chicago
      TITLE: Obsidian
      CUSTOM_RES_W: "1920"
      CUSTOM_RES_H: "1080"
      DRINODE: /dev/dri/renderD128
    volumes:
      - /home/mello/.config/obsidian-container:/config
      - /home/mello/obsidian-vault:/vaults
    ports:
      - "127.0.0.1:8099:3000"
    shm_size: "1gb"
    networks:
      - n8n-net

volumes:

  clickhouse_data:
  n8n_data:
    external: true
  n8n_postgres_data:
    external: true

  nocodb_data:
    external: true
  # qdrant_data: REMOVED
  surreal_data:
    external: true
  surreal_data_v3:
  comfyui_data:
  mcp_logs:
  prometheus_data:
  loki_data:
  promtail_positions:
  ollama_embed_data:
  docuseal_data:
  drinkwaretrove-cache:
  mellobooks-uploads:
  matomo_data:
  matomo_db_data:
  social_posting_media:
  social_posting_packs:
  stemdeck_cache:


networks:
  n8n-net:
    external: true
