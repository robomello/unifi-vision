x-n8n-volumes: &n8n-volumes
  - n8n_data:/home/node/.n8n
  - /data/sites:/data/sites
  - /home/mello/commander:/host/commander
  - /home/mello/commander/projects/langgraph:/host/langgraph
  - /home/mello/n8n-export:/import:ro
  - /usr/share/fonts:/usr/share/fonts:ro

x-n8n-common-env: &n8n-common-env
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: postgres
  DB_POSTGRESDB_PORT: 5432
  DB_POSTGRESDB_DATABASE: n8n
  DB_POSTGRESDB_USER: n8n
  DB_POSTGRESDB_PASSWORD: n8n
  EXECUTIONS_MODE: queue
  QUEUE_BULL_REDIS_HOST: redis
  QUEUE_BULL_REDIS_PORT: 6379
  N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
  N8N_RUNNERS_ENABLED: "true"
  N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
  N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
  N8N_DIAGNOSTICS_ENABLED: "false"
  N8N_BINARY_DATA_MODE: filesystem
  N8N_PAYLOAD_SIZE_MAX: 32
  N8N_EXECUTIONS_DATA_PRUNE: "true"
  N8N_EXECUTIONS_DATA_MAX_AGE: "2"
  N8N_EXECUTIONS_DATA_PRUNE_MAX_COUNT: "100"
  EXECUTIONS_DATA_SAVE_ON_SUCCESS: "all"
  EXECUTIONS_DATA_SAVE_ON_ERROR: "all"
  EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "true"
  EXECUTIONS_DATA_SAVE_ON_PROGRESS: "true"
  NODES_EXCLUDE: "[]"
  NVIDIA_DRIVER_CAPABILITIES: compute,utility,video
  # API Keys from .env
  NOCODB_API: ${NOCODB_API}
  SURREAL_USER: ${SURREAL_USER}
  SURREAL_PASS: ${SURREAL_PASS}
  FAL_KEY: ${FAL_KEY}
  ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
  SURREAL_AUTH_HEADER: ${SURREAL_AUTH_HEADER}
  SCRAPE_CREATORS_API_KEY: ${SCRAPE_CREATORS_API_KEY}
  TELEGRAM_FB_PHOTO_TOKEN: ${TELEGRAM_FB_PHOTO_TOKEN}
  TELEGRAM_FB_EXTRACTOR_TOKEN: ${TELEGRAM_FB_EXTRACTOR_TOKEN}
  TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
  NODE_FUNCTION_ALLOW_BUILTIN: "crypto,fs,path,http,https,url,stream,buffer,querystring,zlib"
  NODE_FUNCTION_ALLOW_EXTERNAL: "*"

x-n8n-deploy: &n8n-deploy
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            device_ids: [ '0' ]
            capabilities: [ gpu ]

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: n8n-postgres
    restart: always
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n
      POSTGRES_DB: n8n
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - n8n-net

  redis:
    image: redis:7-alpine
    container_name: n8n-redis
    restart: always
    networks:
      - n8n-net

  n8n-main:
    container_name: n8n-main
    build:
      context: /home/mello/n8n-ffmpeg
    image: n8n-with-ffmpeg:next
    <<: *n8n-deploy
    restart: always
    depends_on:
      - postgres
      - redis
    environment:
      <<: *n8n-common-env
      WEBHOOK_URL: https://n8n.synai.ai
      N8N_HOST: n8n.synai.ai
      N8N_PORT: 5678
      N8N_PROTOCOL: https
    ports:
      - "127.0.0.1:5678:5678"
    volumes: *n8n-volumes
    networks:
      - n8n-net

  worker-1:
    container_name: n8n-worker-1
    build:
      context: /home/mello/n8n-ffmpeg
    image: n8n-with-ffmpeg:next
    <<: *n8n-deploy
    restart: always
    depends_on:
      - postgres
      - redis
    command: n8n worker
    environment:
      <<: *n8n-common-env
    volumes: *n8n-volumes
    networks:
      - n8n-net

  worker-2:
    container_name: n8n-worker-2
    build:
      context: /home/mello/n8n-ffmpeg
    image: n8n-with-ffmpeg:next
    <<: *n8n-deploy
    restart: always
    depends_on:
      - postgres
      - redis
    command: n8n worker
    environment:
      <<: *n8n-common-env
    volumes: *n8n-volumes
    networks:
      - n8n-net

  worker-3:
    container_name: n8n-worker-3
    build:
      context: /home/mello/n8n-ffmpeg
    image: n8n-with-ffmpeg:next
    <<: *n8n-deploy
    restart: always
    depends_on:
      - postgres
      - redis
    command: n8n worker
    environment:
      <<: *n8n-common-env
    volumes: *n8n-volumes
    networks:
      - n8n-net

  db-cleaner:
    image: postgres:15
    container_name: n8n-db-cleaner
    restart: always
    depends_on:
      - postgres
    environment:
      PGHOST: postgres
      PGUSER: n8n
      PGPASSWORD: n8n
      PGDATABASE: n8n
    networks:
      - n8n-net
    entrypoint: /bin/sh
    command: -c "while true; do sleep 172800; psql -c \"DELETE FROM execution_entity WHERE \\\"startedAt\\\" < NOW() - INTERVAL '240 hours';\"; psql -c \"VACUUM ANALYZE;\"; echo \"Cleaned executions older than 240 hours at $$(date)\"; done"

  nocodb:
    image: nocodb/nocodb@sha256:d9516f0bf546fd6c78a382ab0657626c683fca7aaafdbbe53c66baf15df7fc0d
    container_name: nocodb
    restart: always
    depends_on:
      - postgres
    environment:
      NC_DB: "pg://postgres:5432?u=n8n&p=n8n&d=nocodb"
    ports:
      - "127.0.0.1:8090:8080"
    volumes:
      - nocodb_data:/usr/app/data
    networks:
      - n8n-net

  # qdrant: REMOVED 2026-01-31 - unused, data was redundant with CLAUDE.md
  # Using pgvector on existing PostgreSQL if vector search needed

  factory-agent:
    image: python:3.11-slim
    container_name: factory-agent
    restart: unless-stopped
    environment:
      FAL_KEY: ${FAL_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
    volumes:
      - ./commander/projects/factory-agent:/app
      - ./commander:/host/commander:ro
      - /data/sites:/data/sites
    working_dir: /app
    networks:
      - n8n-net
    command: >
      sh -c "
        apt-get update && apt-get install -y --no-install-recommends ffmpeg curl &&
        pip install --no-cache-dir anthropic fal-client aiohttp &&
        python server.py
      "
    ports:
      - "127.0.0.1:8050:8050"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ '0' ]
              capabilities: [ gpu ]

  deep-origins:
    build:
      context: ./commander/projects/deep-origins
      dockerfile: Dockerfile
    image: deep-origins:latest
    container_name: deep-origins
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://n8n:n8n@postgres:5432/deep_origins
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATA_DIR: /data/videos
      PUBLIC_DIR: /data/sites/evolution
      FONTS_DIR: /usr/share/fonts/truetype/custom
      PUBLIC_BASE_URL: https://videos.evolutionlabs.blog
      HOST: 0.0.0.0
      PORT: 8060
      PYTHONUNBUFFERED: 1
      DEEP_ORIGINS_API_KEY: ${DEEP_ORIGINS_API_KEY}
      DEEP_ORIGINS_AUTH_ENABLED: ${DEEP_ORIGINS_AUTH_ENABLED:-true}
      # Internal NocoDB URL — public nocodb.synai.ai is CF-Access gated, blocking server-to-server.
      # Container is on n8n-net so it can reach nocodb directly.
      NOCODB_INTERNAL_URL: http://nocodb:8080
      NOCODB_API: ${NOCODB_API}
      PATH: "/home/mello/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    volumes:
      - ./commander/projects/deep-origins:/app
      - /data/sites:/data/sites
      - /usr/share/fonts:/usr/share/fonts:ro
      # Claude CLI for LLM calls (no ANTHROPIC_API_KEY — use the CLI per home-server policy).
      # `.claude` and `.claude.json` need to be writable: the CLI updates session
      # persistence, statsig/growthbook cache, and debug logs on every call. With
      # :ro, every claude invocation hits EROFS during appendFileSync and exits
      # with empty stdout.
      - /home/mello/.local/bin:/home/mello/.local/bin:ro
      - /home/mello/.local/share/claude:/home/mello/.local/share/claude:ro
      - /home/mello/.claude.json:/root/.claude.json:rw
      - /home/mello/.claude:/root/.claude:rw
    working_dir: /app
    networks:
      - n8n-net
    ports:
      - "127.0.0.1:8060:8060"

  surrealdb:
    image: surrealdb/surrealdb:v3.0
    container_name: surrealdb
    restart: always
    user: "65532:65532"
    command: start --log info --user ${SURREAL_USER} --pass ${SURREAL_PASS} surrealkv:/data/srdb.db
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - surreal_data_v3:/data
    networks:
      - n8n-net

  surrealist:
    image: surrealdb/surrealist@sha256:b4cca2ae4fd43fb18adaed9b51f34cf3a59d32cf4645eb038c9d0760580c772c
    container_name: surrealist
    restart: always
    ports:
      - "127.0.0.1:8002:8080"
    networks:
      - n8n-net

  commander:
    build:
      context: ./commander
      dockerfile: Dockerfile
    image: commander:latest
    container_name: commander
    user: "1001:1001"
    group_add:
      - "984" # docker group for socket access
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      - surrealdb
    environment:
      HOME: /home/mello
      SURREAL_URL: http://surrealdb:8000
      PYTHONUNBUFFERED: 1
      COMMANDER_WEBHOOK_SECRET: ${COMMANDER_WEBHOOK_SECRET}
    ports:
      - "127.0.0.1:8070:8070"
    networks:
      - n8n-net
    volumes:
      - ./commander:/app
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/mello:/host/mello
      - /data:/data
      - /etc/nginx:/host/nginx:ro
      - /var/log:/host/logs:ro
      - /home/mello/.claude:/home/mello/.claude:ro
      - /home/mello/.claude.json:/home/mello/.claude.json:ro
      - /home/mello/.npm:/home/mello/.npm
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8070/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ '0' ]
              capabilities: [ gpu ]

  comfyui:
    build:
      context: /home/mello/ComfyUI
    image: comfyui:local
    container_name: comfyui
    restart: unless-stopped
    command: ["python", "main.py", "--listen", "0.0.0.0", "--port", "8188", "--enable-cors-header", "https://comfyui.synai.ai", "--disable-pinned-memory", "--disable-async-offload", "--reserve-vram", "2"]
    mem_limit: 40g
    memswap_limit: 56g
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8188:8188"
    volumes:
      - comfyui_data:/home/runner
      - /home/mello/.env:/app/.env:ro
      - /data/sites:/data/sites
      - /home/mello/ComfyUI/input:/app/input
      - /home/mello/ComfyUI/output:/app/output
      - /home/mello/ComfyUI/custom_nodes:/app/custom_nodes
      - /home/mello/ComfyUI/models:/app/models
      - /data/llama-models:/data/llama-models:ro
      - /home/mello/comfyui-workflows:/app/user/default/workflows
      - /home/mello/vlm-inspect:/app/vlm-inspect
      - /home/mello/.claude.json:/root/.claude.json:ro
    environment:
      TORCH_COMPILE_DISABLE: "1"
      COMFY_API_KEY: ${COMFY_API_KEY}
      LD_LIBRARY_PATH: "/usr/lib/x86_64-linux-gnu:/usr/local/lib/python3.12/dist-packages/nvidia/cu13/lib:/usr/local/nvidia/lib:/usr/local/nvidia/lib64"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ '0' ]
              capabilities: [ gpu ]
    networks:
      - n8n-net

  mcp-server:
    build:
      context: ./commander/projects/mcp-server
    image: mcp-server:latest
    container_name: mcp-server
    restart: unless-stopped
    environment:
      MCP_API_KEY: ${MCP_API_KEY}
      MCP_REQUIRE_AUTH: "true"
      MCP_AUTH_ENABLED: ${MCP_AUTH_ENABLED:-true}
      MCP_OAUTH_ENABLED: ${MCP_OAUTH_ENABLED:-true}
      MCP_LEGACY_AUTH: ${MCP_LEGACY_AUTH:-true}
      MCP_ISSUER_URL: ${MCP_ISSUER_URL:-https://mcp.synai.ai}
      MCP_RESOURCE_URL: ${MCP_RESOURCE_URL:-https://mcp.synai.ai/mcp}
      MCP_DB_PATH: /app/data/oauth.db
      MCP_CF_TEAM_DOMAIN: ${MCP_CF_TEAM_DOMAIN:-https://home-server-mello.cloudflareaccess.com}
      MCP_CF_ACCESS_AUD: ${MCP_CF_ACCESS_AUD:-}
      MCP_AUDIT_LOG: /app/logs/audit.log
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: "8000"
    ports:
      - "127.0.0.1:8080:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/mello:/home/mello
      - /data:/data
      - /var/www:/var/www
      - /etc/nginx:/etc/nginx:ro
      - /var/log:/var/log:ro
      - ./commander/projects/mcp-server/data:/app/data
    networks:
      - n8n-net

  youtube-uploader:
    build:
      context: ./commander/projects/youtube-uploader
    image: youtube-uploader:latest
    container_name: youtube-uploader
    restart: unless-stopped
    ports:
      - "127.0.0.1:8055:8055"
    volumes:
      - ./commander/projects/youtube-uploader:/app
      - /data:/data:ro
    networks:
      - n8n-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=32
      - OLLAMA_FLASH_ATTENTION=1
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - /home/mello/.ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ '0' ]
              capabilities: [ gpu ]
    networks:
      - n8n-net
  ollama-embed:
    image: ollama/ollama:latest
    container_name: ollama-embed
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
      OLLAMA_NUM_PARALLEL: "3"
      NVIDIA_VISIBLE_DEVICES: "0"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ '0' ]
              capabilities: [ gpu ]
    volumes:
      - ollama_embed_data:/root/.ollama
    networks:
      - n8n-net

  # mindfulmoment:
  #   build:
  #     context: /data/sites/mindfulmoment
  #     dockerfile: Dockerfile
  #   image: mindfulmoment:latest
  #   container_name: mindfulmoment
  #   restart: unless-stopped
  #   environment:
  #     MINDFUL_SUPABASE_URL: http://supabase-kong:8000
