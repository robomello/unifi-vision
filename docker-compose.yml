  street-camera:
    build:
      context: ./commander/projects/street-camera
    image: street-camera:latest
    container_name: street-camera
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      UNIFI_HOST: ${UNIFI_PROTECT_HOST}
      UNIFI_USERNAME: ${UNIFI_USER}
      UNIFI_PASSWORD: ${UNIFI_PASS}
      SAMPLE_FPS: "5"
      SAVE_SNAPSHOTS: "true"
      IMAGE_DIR: /data/street-camera/images
      DB_PATH: /data/street-camera/analytics.db
      MIN_CONFIDENCE: "0.60"
      DAILY_REPORT_HOUR: "21"
      IMAGE_RETENTION_DAYS: "7"
      REPORT_PORT: "8097"
      PYTHONUNBUFFERED: 1
      NVIDIA_VISIBLE_DEVICES: 0
      COMFYUI_URL: http://comfyui:8188
      OLLAMA_VLM_URL: http://ollama-embed:11434
      OLLAMA_VLM_MODEL: qwen2.5vl:7b
      ALERT_URL: http://street-camera-bot:8098/alert
    volumes:
      - ./commander/projects/street-camera:/app
      - /data/street-camera:/data/street-camera
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    depends_on:
      - street-camera-bot
      - ollama-embed
    networks:
      - n8n-net

  street-camera-bot:
    build:
      context: ./commander/projects/street-camera-bot
    image: street-camera-bot:latest
    container_name: street-camera-bot
    restart: unless-stopped
    environment:
      TELEGRAM_TRUCK_TOKEN: ${TELEGRAM_TRUCK_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS}
      DETECTION_DIR: /data/street-camera/images
      ALERT_PORT: "8098"
      REPORT_URL: http://street-camera:8097/report
      PYTHONUNBUFFERED: 1
      HOME: /home/mello
    volumes:
      - ./commander/projects/street-camera-bot:/app
      - /data/street-camera:/data/street-camera
      - /home/mello/.claude.json:/home/mello/.claude.json:ro
      - /home/mello/.claude:/home/mello/.claude:ro
    networks:
      - n8n-net

  cloudflared:
    image: cloudflare/cloudflared@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - n8n-net

  # Personal activity tracker — UTC-6, single user, mobile-first.
  # Tunnel route: activity.synai.ai -> activity-tracker:8076
  activity-tracker:
    build:
      context: ./commander/projects/activity-tracker
      dockerfile: Dockerfile
    image: activity-tracker:latest
    container_name: activity-tracker
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://n8n:n8n@postgres:5432/activity
      APP_TZ_OFFSET_HOURS: "-6"
      PYTHONUNBUFFERED: "1"
    ports:
      - "127.0.0.1:8076:8076"
    networks:
      - n8n-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8076/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s


  # StemDeck -- local YouTube -> 6-stem audio separator (Demucs htdemucs_6s).
  # Tunnel route: stemdeck.synai.ai -> stemdeck:8000.
  # GPU 0 shared with comfyui/whisper/ollama. No VRAM guard; manual coordination.
  # entrypoint.sh updates yt-dlp on every container start.
  stemdeck:
    build:
      context: ./commander/projects/stemdeck
      dockerfile: build/Dockerfile.gpu
    image: stemdeck:mello
    container_name: stemdeck
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8059:8000"
    volumes:
      - ./commander/projects/stemdeck/jobs:/app/jobs
      - stemdeck_cache:/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ '0' ]
              capabilities: [ gpu ]
    networks:
      - n8n-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  docuseal:
    image: docuseal/docuseal:latest
    container_name: docuseal
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3013:3000"
    volumes:
      - docuseal_data:/data/docuseal
    environment:
      - FORCE_SSL=docuseal.synai.ai
      - HOST=docuseal.synai.ai
      - WORKERS=2
    networks:
      - n8n-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

